<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Log — Rudraansh Patel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text-muted: #6b6860;
    --text-dim: #3a3935;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-hover: rgba(200,240,96,0.2);
    --today-ring: rgba(200,240,96,0.5);
    --entry: #2a2a2a;
    --entry-text: #c8f060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 5rem;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 3.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .header-left .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-left h1 {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-right {
    text-align: right;
  }

  .streak-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,96,0.2);
    border-radius: 4px;
    padding: 4px 10px;
    letter-spacing: 0.05em;
  }

  /* ── Nav row ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .cal-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }

  .cal-nav button:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .cal-nav .month-label {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .cal-nav .month-label span {
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 8px;
    font-size: 0.95rem;
  }

  /* ── Day labels ── */
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 6px;
  }

  .day-labels span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-align: center;
    text-transform: uppercase;
    padding: 4px 0;
  }

  /* ── Grid ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    border: 1px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
    user-select: none;
  }

  .day-cell .num {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    line-height: 1;
  }

  /* empty cells */
  .day-cell.empty { pointer-events: none; }

  /* future cells */
  .day-cell.future .num { color: var(--text-dim); }

  /* today */
  .day-cell.today {
    border-color: var(--today-ring);
  }

  .day-cell.today .num {
    color: var(--accent);
  }

  /* has entry */
  .day-cell.has-entry {
    background: var(--accent-dim);
    border-color: rgba(200,240,96,0.15);
    cursor: pointer;
  }

  .day-cell.has-entry .num {
    color: var(--accent);
  }

  .day-cell.has-entry:hover {
    background: var(--accent-hover);
    border-color: rgba(200,240,96,0.35);
  }

  .day-cell.has-entry .dot {
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* past without entry */
  .day-cell.past-empty .num {
    color: var(--text-muted);
    opacity: 0.4;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 1.5rem;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
  }

  .swatch-entry { background: var(--accent-dim); border: 1px solid rgba(200,240,96,0.2); }
  .swatch-today { background: transparent; border: 1px solid var(--today-ring); }
  .swatch-empty { background: transparent; border: 1px solid var(--border); opacity: 0.5; }

  /* ── Recent entries sidebar ── */
  .recent-section {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
  }

  .recent-section h2 {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .recent-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }

  .recent-item:hover {
    border-color: var(--border-hover);
    background: var(--bg3);
  }

  .recent-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 100px;
  }

  .recent-title {
    font-size: 14px;
    color: var(--text);
    flex: 1;
  }

  .recent-arrow {
    color: var(--text-muted);
    font-size: 14px;
  }

  .no-entries {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    padding: 1rem 0;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .wrap { padding: 2rem 1rem 4rem; }
    .header-left h1 { font-size: 1.8rem; }
    .day-cell .num { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="header-left">
      <p class="eyebrow">rudraanshpatel.in</p>
      <h1>daily<span>.</span></h1>
    </div>
    <div class="header-right">
      <div class="streak-badge" id="streak-badge">loading...</div>
    </div>
  </header>

  <div class="cal-nav">
    <button id="prev-btn" aria-label="Previous month">&#8592;</button>
    <div class="month-label" id="month-label">—</div>
    <button id="next-btn" aria-label="Next month">&#8594;</button>
  </div>

  <div class="day-labels">
    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
    <span>Thu</span><span>Fri</span><span>Sat</span>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-entry"></div> has entry</div>
    <div class="legend-item"><div class="legend-swatch swatch-today"></div> today</div>
    <div class="legend-item"><div class="legend-swatch swatch-empty"></div> no entry</div>
  </div>

  <div class="recent-section">
    <h2>Recent Entries</h2>
    <div class="recent-list" id="recent-list"></div>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────
  // Add dates that have entries here in "DD-Mon-YYYY" format
  // Example: "29-May-2026"
  const ENTRIES = [
    // "29-May-2026",
    // "28-May-2026",
  ];

  // Optional: add a short title for recent entries section
  const ENTRY_TITLES = {
    // "29-May-2026": "Solved 3 LC mediums + BFS revision",
  };
  // ────────────────────────────────────────────────────────────

  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun",
                        "Jul","Aug","Sep","Oct","Nov","Dec"];

  function formatDateKey(y, m, d) {
    const dd = String(d).padStart(2,'0');
    return `${dd}-${SHORT_MONTHS[m]}-${y}`;
  }

  const entrySet = new Set(ENTRIES);
  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();

  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    const label = document.getElementById('month-label');
    grid.innerHTML = '';
    label.innerHTML = `${MONTHS[viewMonth]} <span>${viewYear}</span>`;

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    // empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell empty';
      grid.appendChild(cell);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = formatDateKey(viewYear, viewMonth, d);
      const cell = document.createElement('div');
      const cellDate = new Date(viewYear, viewMonth, d);
      const isToday = (cellDate.toDateString() === today.toDateString());
      const isPast = cellDate < today && !isToday;
      const isFuture = cellDate > today;
      const hasEntry = entrySet.has(key);

      let cls = 'day-cell';
      if (hasEntry) cls += ' has-entry';
      else if (isToday) cls += ' today';
      else if (isFuture) cls += ' future';
      else cls += ' past-empty';

      cell.className = cls;
      cell.innerHTML = `<span class="num">${d}</span>${hasEntry ? '<span class="dot"></span>' : ''}`;

      if (hasEntry) {
        cell.title = key;
        cell.setAttribute('role', 'link');
        cell.setAttribute('tabindex', '0');
        cell.addEventListener('click', () => {
          window.location.href = `/daily/${key}/`;
        });
        cell.addEventListener('keydown', e => {
          if (e.key === 'Enter') window.location.href = `/daily/${key}/`;
        });
      }

      grid.appendChild(cell);
    }
  }

  function renderRecent() {
    const list = document.getElementById('recent-list');
    const sorted = [...ENTRIES].sort((a, b) => {
      return parseDateKey(b) - parseDateKey(a);
    }).slice(0, 5);

    if (sorted.length === 0) {
      list.innerHTML = '<p class="no-entries">no entries yet — start today.</p>';
      return;
    }

    sorted.forEach(key => {
      const a = document.createElement('a');
      a.className = 'recent-item';
      a.href = `/daily/${key}/`;
      a.innerHTML = `
        <span class="recent-date">${key}</span>
        <span class="recent-title">${ENTRY_TITLES[key] || 'View entry'}</span>
        <span class="recent-arrow">&#8594;</span>
      `;
      list.appendChild(a);
    });
  }

  function parseDateKey(key) {
    const [dd, mon, yyyy] = key.split('-');
    const mIdx = SHORT_MONTHS.indexOf(mon);
    return new Date(parseInt(yyyy), mIdx, parseInt(dd)).getTime();
  }

  function updateStreak() {
    const badge = document.getElementById('streak-badge');
    if (ENTRIES.length === 0) { badge.textContent = '0 day streak'; return; }

    const sorted = [...ENTRIES].map(parseDateKey).sort((a,b) => b - a);
    let streak = 0;
    let cursor = new Date(today);
    cursor.setHours(0,0,0,0);

    for (let t of sorted) {
      const d = new Date(t);
      d.setHours(0,0,0,0);
      const diff = Math.round((cursor - d) / 86400000);
      if (diff === 0 || diff === 1) { streak++; cursor = d; }
      else break;
    }
    badge.textContent = `${streak} day streak 🔥`;
  }

  document.getElementById('prev-btn').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  });

  renderCalendar();
  renderRecent();
  updateStreak();
</script>
</body>
</html>
