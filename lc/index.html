<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Type a LeetCode problem number, press Enter, land on the problem." />
  <meta name="robots" content="noindex" />
  <title>Go to LeetCode problem — rudraanshpatel.in</title>
  <link rel="canonical" href="https://rudraanshpatel.in/lc" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="lc-stage">

  <main class="lc-frame">
    <p class="lc-caption mono lc-caption--top">Go to LeetCode problem</p>

    <form id="lcForm" autocomplete="off" class="lc-number-row">
      <span class="lc-hash mono">#</span>
      <input
        type="text"
        id="lcInput"
        class="lc-input mono"
        inputmode="numeric"
        pattern="[0-9]*"
        autofocus
        aria-label="LeetCode problem number"
      />
    </form>

    <p class="lc-caption mono lc-caption--bottom">
      type a number &middot; press <kbd>enter</kbd>
    </p>
  </main>

  <script>
    (function () {
      var input = document.getElementById('lcInput');
      var form  = document.getElementById('lcForm');

      input.focus();
      document.addEventListener('click', function () { input.focus(); });

      input.addEventListener('input', function () {
        input.value = input.value.replace(/\D/g, '');
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var n = input.value.trim();
        if (!n) return;
        window.location.href = '/' + n;
      });
    })();
  </script>

</body>
</html>
