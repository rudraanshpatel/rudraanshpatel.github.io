<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found — rudraanshpatel.in</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* Override anything; we want the match-cut geometry here */
    body.lc-stage { max-width: none; }
    .hidden { display: none; }

    /* Premium chooser specifics (only used on the premium screen) */
    .title {
      font-size: 18px;
      color: var(--ink);
      margin: 0 0 24px;
      font-weight: 500;
    }
    .choices {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 24px 0;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: bold;
      text-decoration: none;
      border: 1.5px solid var(--ink);
      transition: background 0.12s, color 0.12s;
    }
    .btn:visited { color: var(--paper); }
    .btn:hover { background: var(--paper); color: var(--ink); }
    .btn--secondary {
      background: transparent;
      color: var(--ink);
    }
    .btn--secondary:visited { color: var(--ink); }
    .btn--secondary:hover { background: var(--ink); color: var(--paper); }

    .footnote {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--ink-dim);
      margin-top: 24px;
    }

    /* Default-404 specifics */
    .nf-h1 {
      font-family: var(--mono);
      font-size: 5rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin: 0 0 0.5rem;
    }
    .nf-text { color: var(--ink-muted); margin: 0; }
  </style>
</head>
<body class="lc-stage">

  <!-- ─── LOOKUP (match-cut target) ─── -->
  <main id="redirecting" class="lc-frame">
    <p class="lc-caption mono lc-caption--top">Looking up LeetCode problem</p>

    <div class="lc-number-row">
      <span class="lc-hash mono">#</span>
      <span id="numLabel" class="lc-input lc-static mono"></span>
    </div>

    <p class="lc-caption mono lc-caption--bottom" id="status">loading index&hellip;</p>
  </main>

  <!-- ─── PREMIUM CHOOSER ─── -->
  <main id="premium" class="lc-frame hidden">
    <p class="lc-caption mono lc-caption--top">Premium problem</p>

    <div class="lc-number-row">
      <span class="lc-hash mono">#</span>
      <span id="premiumNum" class="lc-input lc-static mono"></span>
    </div>

    <p id="premiumTitle" class="title"></p>
    <div class="choices">
      <a id="goLeetcode" href="#" class="btn">Open on LeetCode</a>
      <a id="goGoogle" href="#" class="btn btn--secondary">Search on Google</a>
    </div>
    <p class="footnote"><a href="/">&larr; back home</a></p>
  </main>

  <!-- ─── DEFAULT 404 ─── -->
  <main id="notFound" class="lc-frame hidden">
    <h1 class="nf-h1">404</h1>
    <p class="nf-text">
      This page doesn't exist. Head <a href="/">home</a>,
      or try a problem number like <a href="/1">/1</a>.
    </p>
  </main>

  <script>
    (function () {
      var path  = window.location.pathname.replace(/^\/+|\/+$/g, '');
      var match = /^(\d+)$/.exec(path);

      var redirectingEl = document.getElementById('redirecting');
      var premiumEl     = document.getElementById('premium');
      var notFoundEl    = document.getElementById('notFound');
      var numLabel      = document.getElementById('numLabel');
      var statusEl      = document.getElementById('status');
      var premiumNum    = document.getElementById('premiumNum');
      var premiumTitle  = document.getElementById('premiumTitle');
      var goLeetcode    = document.getElementById('goLeetcode');
      var goGoogle      = document.getElementById('goGoogle');

      function showNotFound() {
        redirectingEl.classList.add('hidden');
        notFoundEl.classList.remove('hidden');
      }

      function showPremium(entry) {
        premiumNum.textContent = entry.id;
        premiumTitle.textContent = entry.title;
        goLeetcode.href = 'https://leetcode.com/problems/' + entry.slug + '/description/';
        var q = encodeURIComponent('"' + entry.title + '" leetcode solution');
        goGoogle.href = 'https://www.google.com/search?q=' + q;
        redirectingEl.classList.add('hidden');
        premiumEl.classList.remove('hidden');
      }

      function go(slug) {
        window.location.replace('https://leetcode.com/problems/' + slug + '/description/');
      }

      if (!match) {
        showNotFound();
        return;
      }

      var n = parseInt(match[1], 10);
      numLabel.textContent = n;
      statusEl.textContent = 'loading index…';

      fetch('/problems.json')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          var problems = (data && data.problems) || [];
          var entry = null;
          for (var i = 0; i < problems.length; i++) {
            if (problems[i].id === n) { entry = problems[i]; break; }
          }

          if (!entry) {
            statusEl.textContent = 'no such problem (#' + n + ')';
            setTimeout(showNotFound, 1200);
            return;
          }

          if (entry.premium) {
            showPremium(entry);
          } else {
            go(entry.slug);
          }
        })
        .catch(function (err) {
          console.warn('[lc-redirect] failed:', err);
          statusEl.textContent = 'lookup failed';
          setTimeout(showNotFound, 1500);
        });
    })();
  </script>
</body>
</html>
