<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found — rudraanshpatel.in</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e0e12;
      color: #f4ede1;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    h1 { font-size: 64px; margin: 0 0 8px; font-weight: 300; letter-spacing: -0.02em; }
    p { color: rgba(244,237,225,0.6); margin: 0 0 24px; line-height: 1.6; }
    a { color: #ff7a3d; text-decoration: none; border-bottom: 1px solid rgba(255,122,61,0.4); }
    a:hover { border-bottom-color: #ff7a3d; }
    .status {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px;
      color: rgba(244,237,225,0.4);
      margin-top: 16px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Default 404 view, hidden while we're redirecting -->
    <div id="notFound" class="hidden">
      <h1>404</h1>
      <p>This page doesn't exist. Head <a href="/">home</a>, or try a problem number like <a href="/1">/1</a>.</p>
    </div>

    <!-- Shown while we're looking up a LeetCode problem -->
    <div id="redirecting">
      <h1 id="numLabel">…</h1>
      <p>Looking up LeetCode problem…</p>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    (function () {
      // ---- config ----
      // LeetCode's own /api/problems/all/ no longer sends CORS headers, so
      // browsers block it from any other origin. This community proxy is
      // a tiny FastAPI wrapper that returns one problem at a time and
      // does send Access-Control-Allow-Origin: *.
      // Source: github.com/noworneverev/leetcode-api
      var API = 'https://leetcode-api-pied.vercel.app/problem/';
      var CACHE_KEY = 'lc_slug_map_v2';
      var CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7d — individual slugs ~never change

      // ---- parse the path ----
      // Accept "/1", "/1/", "/0042" — anything that's just digits after the slash.
      var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
      var match = /^(\d+)$/.exec(path);

      var notFoundEl = document.getElementById('notFound');
      var redirectingEl = document.getElementById('redirecting');
      var numLabel = document.getElementById('numLabel');
      var statusEl = document.getElementById('status');

      function showNotFound(reason) {
        redirectingEl.classList.add('hidden');
        notFoundEl.classList.remove('hidden');
        if (reason) console.warn('[lc-redirect]', reason);
      }

      if (!match) {
        showNotFound();
        return;
      }

      // strip leading zeros so "0042" -> 42
      var n = parseInt(match[1], 10);
      numLabel.textContent = '#' + n;

      // ---- per-problem slug cache (id -> slug) ----
      function readMap() {
        try {
          var raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return {};
          var parsed = JSON.parse(raw);
          if (!parsed || !parsed.t || !parsed.map) return {};
          if (Date.now() - parsed.t > CACHE_TTL_MS) return {};
          return parsed.map;
        } catch (e) { return {}; }
      }

      function writeMap(map) {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), map: map }));
        } catch (e) { /* quota or disabled — fine */ }
      }

      function go(slug) {
        window.location.replace('https://leetcode.com/problems/' + slug + '/description/');
      }

      var map = readMap();
      if (map[n]) {
        statusEl.textContent = 'cached';
        go(map[n]);
        return;
      }

      // ---- fetch this one problem ----
      statusEl.textContent = 'fetching…';
      fetch(API + n)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          // The proxy's response shape has changed before and may again.
          // Rather than guess at field names, walk the whole object and
          // pick the first string that looks like a LeetCode slug.
          // Slugs are lowercase letters, digits, and hyphens; at least
          // two parts joined by a hyphen (e.g. "two-sum", "jump-game",
          // "longest-substring-without-repeating-characters").
          var SLUG_RE = /^[a-z0-9]+(?:-[a-z0-9]+)+$/;
          var slug = null;
          (function walk(node) {
            if (slug || node == null) return;
            if (typeof node === 'string') {
              if (SLUG_RE.test(node)) slug = node;
              return;
            }
            if (typeof node !== 'object') return;
            // Prefer obvious key names first so we don't accidentally
            // grab a slug from a "similarProblems" list or anything
            // nested deep.
            var preferred = ['titleSlug', 'title_slug', 'slug', 'questionTitleSlug'];
            for (var i = 0; i < preferred.length; i++) {
              var v = node[preferred[i]];
              if (typeof v === 'string' && SLUG_RE.test(v)) { slug = v; return; }
            }
            // Fall back to a recursive walk.
            for (var k in node) {
              if (Object.prototype.hasOwnProperty.call(node, k)) walk(node[k]);
              if (slug) return;
            }
          })(data);

          if (!slug) {
            console.warn('[lc-redirect] no slug found in response:', data);
            statusEl.textContent = 'no such problem (#' + n + ')';
            setTimeout(showNotFound, 1200);
            return;
          }
          map[n] = slug;
          writeMap(map);
          go(slug);
        })
        .catch(function (err) {
          statusEl.textContent = 'lookup failed — ' + err.message;
          setTimeout(showNotFound, 1500);
        });
    })();
  </script>
</body>
</html>
