<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found — rudraanshpatel.in</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e0e12;
      color: #f4ede1;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    h1 { font-size: 64px; margin: 0 0 8px; font-weight: 300; letter-spacing: -0.02em; }
    p { color: rgba(244,237,225,0.6); margin: 0 0 24px; line-height: 1.6; }
    a { color: #ff7a3d; text-decoration: none; border-bottom: 1px solid rgba(255,122,61,0.4); }
    a:hover { border-bottom-color: #ff7a3d; }
    .status {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px;
      color: rgba(244,237,225,0.4);
      margin-top: 16px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Default 404 view, hidden while we're redirecting -->
    <div id="notFound" class="hidden">
      <h1>404</h1>
      <p>This page doesn't exist. Head <a href="/">home</a>, or try a problem number like <a href="/1">/1</a>.</p>
    </div>

    <!-- Shown while we're looking up a LeetCode problem -->
    <div id="redirecting">
      <h1 id="numLabel">…</h1>
      <p>Looking up LeetCode problem…</p>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    (function () {
      // ---- config ----
      var LIST_URL = 'https://leetcode.com/api/problems/all/';
      var CACHE_KEY = 'lc_slug_map_v1';
      var CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24h

      // ---- parse the path ----
      // Accept "/1", "/1/", "/0042" — anything that's just digits after the slash.
      var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
      var match = /^(\d+)$/.exec(path);

      var notFoundEl = document.getElementById('notFound');
      var redirectingEl = document.getElementById('redirecting');
      var numLabel = document.getElementById('numLabel');
      var statusEl = document.getElementById('status');

      function showNotFound(reason) {
        redirectingEl.classList.add('hidden');
        notFoundEl.classList.remove('hidden');
        if (reason) console.warn('[lc-redirect]', reason);
      }

      if (!match) {
        showNotFound();
        return;
      }

      // strip leading zeros so "0042" -> 42
      var n = parseInt(match[1], 10);
      numLabel.textContent = '#' + n;

      // ---- try cache first ----
      function readCache() {
        try {
          var raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (!parsed || !parsed.t || !parsed.map) return null;
          if (Date.now() - parsed.t > CACHE_TTL_MS) return null;
          return parsed.map;
        } catch (e) { return null; }
      }

      function writeCache(map) {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), map: map }));
        } catch (e) { /* localStorage may be full or disabled — that's fine */ }
      }

      function go(slug) {
        window.location.replace('https://leetcode.com/problems/' + slug + '/description/');
      }

      var cached = readCache();
      if (cached && cached[n]) {
        statusEl.textContent = 'cached';
        go(cached[n]);
        return;
      }

      // ---- fetch the full problem list ----
      statusEl.textContent = 'fetching…';
      fetch(LIST_URL, { credentials: 'omit' })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          // Build a {frontend_id: slug} map and cache it.
          var map = {};
          var pairs = (data && data.stat_status_pairs) || [];
          for (var i = 0; i < pairs.length; i++) {
            var s = pairs[i] && pairs[i].stat;
            if (!s) continue;
            var id = s.frontend_question_id;
            var slug = s.question__title_slug;
            if (id != null && slug) map[id] = slug;
          }
          writeCache(map);

          if (map[n]) {
            go(map[n]);
          } else {
            statusEl.textContent = 'no such problem (#' + n + ')';
            setTimeout(showNotFound, 1200);
          }
        })
        .catch(function (err) {
          statusEl.textContent = 'lookup failed — ' + err.message;
          setTimeout(showNotFound, 1500);
        });
    })();
  </script>
</body>
</html>
