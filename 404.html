<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found — rudraanshpatel.in</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Override body to keep 404's centred single-column layout */
    body {
      max-width: none;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    h1 {
  font-family: var(--mono);
  font-size: 64px;
  margin: 0 0 8px;
  font-weight: bold;       /* mono fonts look weak at weight 300 */
  letter-spacing: -0.02em;
}
    p { color: var(--ink-muted); margin: 0 0 24px; line-height: 1.6; }
    /* Let style.css handle <a> colours; just strip the border-bottom override */
    a { text-decoration: underline; border-bottom: none; }
    a:hover { border-bottom: none; }
    .status {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-dim);
      margin-top: 16px;
    }
    .hidden { display: none; }

    /* Premium choice page */
    .title {
      font-size: 18px;
      color: var(--ink);
      margin: 0 0 24px;
      font-weight: 500;
    }
    .choices {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 24px 0;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: bold;
      text-decoration: none;
      border: 1.5px solid var(--ink);
      transition: background 0.12s, color 0.12s;
    }
    .btn:visited { color: var(--paper); }
    .btn:hover {
      background: var(--link-hover-bg);
      color: var(--ink);
      border-color: var(--ink);
      text-decoration: none;
    }
    .btn--secondary {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--ink);
    }
    .btn--secondary:visited { color: var(--ink); }
    .btn--secondary:hover {
      background: var(--link-hover-bg);
      color: var(--ink);
    }
    .footnote {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-dim);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Default 404 view -->
    <div id="notFound" class="hidden">
      <h1>404</h1>
      <p>This page doesn't exist. Head <a href="/">home</a>, or try a problem number like <a href="/1">/1</a>.</p>
    </div>

    <!-- Shown while looking up the problem -->
    <div id="redirecting">
      <h1 id="numLabel">…</h1>
      <p>Looking up LeetCode problem…</p>
      <div class="status" id="status"></div>
    </div>

    <!-- Shown when the problem is premium -->
    <div id="premium" class="hidden">
      <h1 id="premiumNum">…</h1>
      <p id="premiumTitle" class="title"></p>
      <p>This is a LeetCode <strong>premium</strong> problem. Where would you like to go?</p>
      <div class="choices">
        <a id="goLeetcode" href="#" class="btn">Open on LeetCode</a>
        <a id="goGoogle" href="#" class="btn btn--secondary">Search on Google</a>
      </div>
      <p class="footnote"><a href="/">← back home</a></p>
    </div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
      var match = /^(\d+)$/.exec(path);

      var notFoundEl = document.getElementById('notFound');
      var redirectingEl = document.getElementById('redirecting');
      var premiumEl = document.getElementById('premium');
      var numLabel = document.getElementById('numLabel');
      var statusEl = document.getElementById('status');
      var premiumNum = document.getElementById('premiumNum');
      var premiumTitle = document.getElementById('premiumTitle');
      var goLeetcode = document.getElementById('goLeetcode');
      var goGoogle = document.getElementById('goGoogle');

      function showNotFound() {
        redirectingEl.classList.add('hidden');
        notFoundEl.classList.remove('hidden');
      }

      function showPremium(entry) {
        premiumNum.textContent = '#' + entry.id;
        premiumTitle.textContent = entry.title;
        goLeetcode.href = 'https://leetcode.com/problems/' + entry.slug + '/description/';
        var q = encodeURIComponent('"' + entry.title + '" leetcode solution');
        goGoogle.href = 'https://www.google.com/search?q=' + q;
        redirectingEl.classList.add('hidden');
        premiumEl.classList.remove('hidden');
      }

      function go(slug) {
        window.location.replace('https://leetcode.com/problems/' + slug + '/description/');
      }

      if (!match) {
        showNotFound();
        return;
      }

      var n = parseInt(match[1], 10);
      numLabel.textContent = '#' + n;
      statusEl.textContent = 'loading index…';

      fetch('/problems.json')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          var problems = (data && data.problems) || [];
          var entry = null;
          for (var i = 0; i < problems.length; i++) {
            if (problems[i].id === n) { entry = problems[i]; break; }
          }

          if (!entry) {
            statusEl.textContent = 'no such problem (#' + n + ')';
            setTimeout(showNotFound, 1200);
            return;
          }
          
          if (entry.premium) {
            showPremium(entry);
          } else {
            go(entry.slug);
          }
        })
        .catch(function (err) {
          console.warn('[lc-redirect] failed:', err);
          statusEl.textContent = 'lookup failed';
          setTimeout(showNotFound, 1500);
        });
    })();
  </script>
</body>
